version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: typemywords-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-/data/db
    environment:
      MONGO_INITDB_DATABASE: typemywords
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/typemywords --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: typemywords-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/typemywords
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: typemywords-web
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend

volumes:
  mongo-data: